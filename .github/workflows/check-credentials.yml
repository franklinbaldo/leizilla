name: Check Pipeline Credentials

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  check-ia-access-key:
    runs-on: ubuntu-latest
    steps:
      - name: IA_ACCESS_KEY presente
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
        run: |
          if [ -z "$IA_ACCESS_KEY" ]; then
            echo "::error::IA_ACCESS_KEY não está disponível para este workflow"
            exit 1
          fi
          echo "IA_ACCESS_KEY tem ${#IA_ACCESS_KEY} caracteres"

  check-ia-secret-key:
    runs-on: ubuntu-latest
    steps:
      - name: IA_SECRET_KEY presente
        env:
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          if [ -z "$IA_SECRET_KEY" ]; then
            echo "::error::IA_SECRET_KEY não está disponível para este workflow"
            exit 1
          fi
          echo "IA_SECRET_KEY tem ${#IA_SECRET_KEY} caracteres"

  check-anthropic-key:
    runs-on: ubuntu-latest
    steps:
      - name: ANTHROPIC_API_KEY presente
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY não está disponível para este workflow"
            exit 1
          fi
          echo "ANTHROPIC_API_KEY tem ${#ANTHROPIC_API_KEY} caracteres"

  check-ia-auth:
    needs: [check-ia-access-key, check-ia-secret-key]
    runs-on: ubuntu-latest
    steps:
      - name: Autenticar no Internet Archive S3
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          echo "## check-ia-auth" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- IA_ACCESS_KEY: ${#IA_ACCESS_KEY} chars" >> "$GITHUB_STEP_SUMMARY"
          echo "- IA_SECRET_KEY: ${#IA_SECRET_KEY} chars" >> "$GITHUB_STEP_SUMMARY"
          HTTP_CODE=$(curl -s -o /tmp/ia_resp.txt -w "%{http_code}" --max-time 15 \
            -H "authorization: LOW ${IA_ACCESS_KEY}:${IA_SECRET_KEY}" \
            "https://s3.us.archive.org/?check_auth=1" || echo "curl-failed")
          {
            echo "- HTTP status: \`$HTTP_CODE\`"
            echo "- Response body:"
            echo '```'
            head -c 2000 /tmp/ia_resp.txt
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Stdout também (aparece nos logs)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat /tmp/ia_resp.txt
          echo ""
          if ! grep -q '"authorized":true' /tmp/ia_resp.txt; then
            echo "::error::Falha de autenticação IA — veja Step Summary do workflow"
            exit 1
          fi
          echo "✅ IA autenticado"
