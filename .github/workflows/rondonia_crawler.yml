name: Crawl Rondônia Laws

on:
  schedule:
    - cron: "0 0 * * 0"  # Weekly on Sunday midnight UTC
  workflow_dispatch:
    inputs:
      start_coddoc:
        description: "Primeiro coddoc (ALRO/assembleia)"
        default: "1"
      end_coddoc:
        description: "Último coddoc (ALRO/assembleia)"
        default: "100"
      casacivil_start:
        description: "Primeiro número de lei (casacivil)"
        default: "1"
      casacivil_end:
        description: "Último número de lei (casacivil)"
        default: "100"
      skip_existing:
        description: "Pula itens já no IA ('true'=incremental, 'false'=re-scrape completo)"
        default: "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Scrape Rondônia — assembleia (ALRO)
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          SKIP="${{ inputs.skip_existing || 'true' }}"
          if [ "${SKIP,,}" = "true" ]; then SKIP_FLAG="--skip-existing"; else SKIP_FLAG="--no-skip-existing"; fi
          uv run leizilla scrape \
            --ente ro \
            --fonte assembleia \
            --start-coddoc ${{ inputs.start_coddoc || '1' }} \
            --end-coddoc ${{ inputs.end_coddoc || '100' }} \
            "$SKIP_FLAG"

      - name: Scrape Rondônia — casacivil (leis ordinárias)
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          SKIP="${{ inputs.skip_existing || 'true' }}"
          if [ "${SKIP,,}" = "true" ]; then SKIP_FLAG="--skip-existing"; else SKIP_FLAG="--no-skip-existing"; fi
          uv run leizilla scrape \
            --ente ro \
            --fonte casacivil \
            --tipo lei \
            --start-coddoc ${{ inputs.casacivil_start || '1' }} \
            --end-coddoc ${{ inputs.casacivil_end || '100' }} \
            "$SKIP_FLAG"

      - name: Scrape Rondônia — casacivil (leis complementares)
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          SKIP="${{ inputs.skip_existing || 'true' }}"
          if [ "${SKIP,,}" = "true" ]; then SKIP_FLAG="--skip-existing"; else SKIP_FLAG="--no-skip-existing"; fi
          uv run leizilla scrape \
            --ente ro \
            --fonte casacivil \
            --tipo lc \
            --start-coddoc ${{ inputs.casacivil_start || '1' }} \
            --end-coddoc ${{ inputs.casacivil_end || '100' }} \
            "$SKIP_FLAG"
