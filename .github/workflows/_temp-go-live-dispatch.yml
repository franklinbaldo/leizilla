name: "TEMP — Go-live dispatch (RFC-0004 passos 4-6)"

# Workflow temporário, push-triggered em vez de workflow_dispatch: a integração
# GitHub usada por esta sessão não tem escopo `actions: write` (necessário para
# workflow_dispatch), mas push não exige esse escopo. Mesma técnica já usada em
# sessões anteriores (bugfix do check-credentials, smoke batch original) — ver
# IMPLEMENTATION.md/docs/rfc/0004-go-live-rondonia.md. Remover após o uso.

on:
  push:
    branches: [claude/temp-go-live-dispatch]

permissions:
  contents: read

jobs:
  go-live:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Create output dir
        run: mkdir -p /tmp/leizilla-xmls

      - name: Parse — ro/casacivil lei (seed batch, limit 100)
        # error-threshold 0 = desabilitado de propósito: o smoke de 10 itens
        # mostrou 9/15 rejeições legítimas por confiança baixa (fail-closed,
        # OCR ruim de leis de 1983 — não é bug, ver PR #109), e o gate de 20%
        # abortaria este lote maior antes de acumular sucessos suficientes
        # para o primeiro dataset real. --skip-existing evita reprocessar os
        # já publicados.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla parse-all \
            --ente ro --fonte casacivil --tipo lei \
            --start 1 --end 1000 \
            --limit 100 --output-dir /tmp/leizilla-xmls \
            --skip-existing --error-threshold 0 --upload

      - name: Fetch all parsed XMLs from IA (cumulative)
        run: |
          uv run leizilla fetch-all-parsed \
            --ente ro --output-dir /tmp/leizilla-xmls

      - name: Consolidate XML -> Parquet
        run: |
          uv run leizilla consolidate /tmp/leizilla-xmls \
            --output /tmp/leizilla-dataset.parquet --ente ro

      - name: Release dataset v0 to IA
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla release-dataset /tmp/leizilla-dataset.parquet \
            --ente ro --version 0
