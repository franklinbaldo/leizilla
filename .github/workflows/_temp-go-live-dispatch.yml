name: "TEMP — Go-live dispatch (RFC-0004 passos 4-6)"

# Workflow temporário, push-triggered em vez de workflow_dispatch: a integração
# GitHub usada por esta sessão não tem escopo `actions: write` (necessário para
# workflow_dispatch), mas push não exige esse escopo. Mesma técnica já usada em
# sessões anteriores (bugfix do check-credentials, smoke batch original) — ver
# IMPLEMENTATION.md/docs/rfc/0004-go-live-rondonia.md. Remover após o uso.

on:
  push:
    branches: [claude/temp-go-live-dispatch-v2]

permissions:
  contents: read

jobs:
  go-live:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Create output dir
        run: mkdir -p /tmp/leizilla-xmls

      # Sem step de parse desta vez: o run anterior já deixou 11 leis novas
      # publicadas individualmente no IA (upload é síncrono por item), mas a
      # cadeia abortou antes do release por causa de "Please reduce your
      # request rate ... appears to be spam" do próprio IA (rajada de ~15
      # uploads em ~10min) — não um bug de parse. Rodar mais parse agora só
      # bateria de novo no teto diário do Gemini free tier (RPD=20, já
      # esgotado em gemini-2.5-flash e gemini-2.5-flash-lite hoje) e faria
      # mais uploads logo após o aviso do IA. Este run só recolhe o que já
      # está publicado (fetch-all-parsed) e republica o dataset — um único
      # upload (o Parquet), não uma rajada.

      - name: Fetch all parsed XMLs from IA (cumulative)
        run: |
          uv run leizilla fetch-all-parsed \
            --ente ro --output-dir /tmp/leizilla-xmls

      - name: Consolidate XML -> Parquet
        run: |
          uv run leizilla consolidate /tmp/leizilla-xmls \
            --output /tmp/leizilla-dataset.parquet --ente ro

      - name: Release dataset v0 to IA
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla release-dataset /tmp/leizilla-dataset.parquet \
            --ente ro --version 0
