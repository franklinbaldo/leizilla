name: Discover & Harvest (manifest-driven)

on:
  schedule:
    # Sábado 02:00 UTC — jobs paralelos por tipo garantem ~7x throughput vs serial
    - cron: "0 2 * * 6"
  workflow_dispatch:
    inputs:
      ente:
        description: "Ente federativo (ro, sp, federal)"
        default: "ro"
      tipo:
        description: "Tipo (lei, lc, decreto, ec, resolucao, portaria, decreto-lei) — vazio = todos em paralelo"
        default: ""
      limit:
        description: "Limite de recursos por job"
        default: "500"

jobs:
  # ── DISPATCH com tipo específico ──────────────────────────────────────────
  harvest-single:
    if: github.event_name == 'workflow_dispatch' && inputs.tipo != ''
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run playwright install chromium --with-deps

      - name: Discover
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: uv run leizilla discover --ente "${{ inputs.ente }}"

      - name: Harvest — ${{ inputs.tipo }}
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla harvest \
            --ente "${{ inputs.ente }}" \
            --tipo "${{ inputs.tipo }}" \
            --limit "${{ inputs.limit }}"

  # ── SCHEDULED ou DISPATCH sem tipo: todos os tipos em paralelo ────────────
  harvest-parallel:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.tipo == '')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        tipo: [lei, lc, decreto, ec, resolucao, portaria, decreto-lei]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run playwright install chromium --with-deps

      - name: Discover (ente ro)
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: uv run leizilla discover --ente "${{ inputs.ente || 'ro' }}"

      - name: Harvest — ${{ matrix.tipo }}
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla harvest \
            --ente "${{ inputs.ente || 'ro' }}" \
            --tipo "${{ matrix.tipo }}" \
            --limit "${{ inputs.limit || '500' }}"
