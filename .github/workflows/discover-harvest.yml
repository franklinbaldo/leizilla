name: Discover & Harvest (manifest-driven)

on:
  schedule:
    # Sábado 02:00 UTC — paralelismo dos 7 tipos limitado a 2 por vez
    # (max-parallel na matrix abaixo), pra não fazer o IA recusar a rajada
    # de uploads como spam (achado de produção, 2026-07-14).
    - cron: "0 2 * * 6"
  workflow_dispatch:
    inputs:
      ente:
        description: "Ente federativo (ro, sp, federal)"
        default: "ro"
      fonte:
        description: "Fonte do manifesto a descobrir. assembleia crawla ~5000 páginas sequencialmente (Playwright) e pode travar por horas (#105) — só escolha manualmente quando quiser rodá-la de propósito."
        type: choice
        default: "casacivil"
        options:
          - casacivil
          - assembleia
      tipo:
        description: "Tipo (lei, lc, decreto, ec, resolucao, portaria, decreto-lei) — vazio = todos em paralelo"
        default: ""
      limit:
        description: "Limite de recursos por job"
        default: "500"

permissions:
  contents: read
  issues: write

# Singleton: evita um dispatch manual correndo ao mesmo tempo que o cron
# semanal (ambos disputariam upload no IA e discovery duplicado).
concurrency:
  group: discover-harvest
  cancel-in-progress: false

jobs:
  # ── DISPATCH com tipo específico ──────────────────────────────────────────
  harvest-single:
    if: github.event_name == 'workflow_dispatch' && inputs.tipo != ''
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run playwright install chromium --with-deps

      - name: Discover
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: uv run leizilla discover --ente "${{ inputs.ente }}" --fonte "${{ inputs.fonte }}"

      - name: Harvest — ${{ inputs.tipo }}
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla harvest \
            --ente "${{ inputs.ente }}" \
            --tipo "${{ inputs.tipo }}" \
            --limit "${{ inputs.limit }}"

      - name: Notify on failure
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/notify-run-failure
        with:
          job-label: "discover-harvest / ${{ inputs.tipo }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ── SCHEDULED ou DISPATCH sem tipo: todos os tipos, paralelismo limitado ──
  harvest-parallel:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.tipo == '')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      # max-parallel: 2 (não 7, o default) — os 7 jobs fariam upload pro IA
      # ao mesmo tempo; uma rajada assim levou o IA a recusar uploads como
      # spam em produção (2026-07-14: "Please reduce your request rate").
      # `_run_ia_upload` (publisher.py) já paceia/retry por processo, mas não
      # protege contra 7 PROCESSOS distintos batendo juntos.
      max-parallel: 2
      matrix:
        tipo: [lei, lc, decreto, ec, resolucao, portaria, decreto-lei]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run playwright install chromium --with-deps

      - name: Discover (ente ro)
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: uv run leizilla discover --ente "${{ inputs.ente || 'ro' }}" --fonte "${{ inputs.fonte || 'casacivil' }}"

      - name: Harvest — ${{ matrix.tipo }}
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla harvest \
            --ente "${{ inputs.ente || 'ro' }}" \
            --tipo "${{ matrix.tipo }}" \
            --limit "${{ inputs.limit || '500' }}"

      - name: Notify on failure
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/notify-run-failure
        with:
          job-label: "discover-harvest / ${{ matrix.tipo }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}
