name: Discover & Harvest (manifest-driven)

on:
  schedule:
    # Sábado 02:00 UTC — antes do scraping dominical (rondonia_crawler.yml)
    # Wayback CDX pode descobrir URLs novas que o scraping sequencial perderia
    - cron: "0 2 * * 6"
  workflow_dispatch:
    inputs:
      ente:
        description: "Ente federativo (ro, sp, federal)"
        default: "ro"
      limit:
        description: "Limite de recursos a harvesting por run"
        default: "200"

jobs:
  discover-harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Discover — populate DuckDB queue from manifests
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          ENTE="${{ inputs.ente || 'ro' }}"
          uv run leizilla discover --ente "$ENTE"

      - name: Harvest — process pending resources from queue
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          LIMIT="${{ inputs.limit || '200' }}"
          uv run leizilla harvest --limit "$LIMIT"
