name: Parse + ETL + Release Dataset

on:
  schedule:
    # Diário 06:00 UTC. Antes rodava só segunda com --limit 50 x 3 fontes em
    # paralelo (até 150 parses/dia) contra um orçamento real de free-tier de
    # ~20 requisições/dia por modelo (confirmado em produção, 2026-07-14:
    # 429 RESOURCE_EXHAUSTED, quotaId GenerateRequestsPerDayPerProjectPerModel,
    # quotaValue 20) — as 3 fontes competiam pelo mesmo orçamento diário
    # inteiro num único dia da semana, desperdiçando a maior parte das
    # chamadas em 429. Pacing novo: 6+6+6=18/dia, com margem sob o teto.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      ente:
        description: "Ente federativo"
        default: "ro"
      fonte:
        description: "Fonte (casacivil, assembleia, planalto)"
        default: "casacivil"
      start_num:
        description: "Número inicial"
        default: "1"
      end_num:
        description: "Número final"
        default: "100"
      tipo:
        description: "Tipo de lei para fontes HTML (lei, lcp, decreto)"
        default: "lei"
      input_type:
        description: "Tipo de entrada: ocr ou html"
        default: "ocr"
      limit:
        description: "Máx de itens a processar por run (controle de custo)"
        default: "50"
      dataset_version:
        description: "Versão do dataset publicado no IA (inteiro)"
        default: "0"
      dry_run:
        description: "Se 'true', pula upload de parsed items e do dataset"
        default: "false"
      skip_existing:
        description: "Se 'true', pula itens já parseados em IA (incremental)"
        default: "true"

permissions:
  contents: read
  issues: write

# Singleton: um dispatch manual nunca deve rodar ao mesmo tempo que o cron
# diário (ambos disputariam o mesmo orçamento de LLM/IA) — a segunda run
# fica na fila em vez de correr em paralelo.
concurrency:
  group: parse-release
  cancel-in-progress: false

jobs:
  # As 3 fontes agendadas rodam em SÉRIE (via `needs`), não em paralelo: cada
  # uma usa o mesmo GEMINI_API_KEY, e a cota do free tier é por modelo por
  # projeto (não por job) — rodar em paralelo só faz duas delas queimarem o
  # orçamento em 429 enquanto a primeira ainda está consumindo. O job "etl"
  # (fetch-all-parsed → consolidate → release) só depende delas via `needs`
  # e roda mesmo se algum parse individual falhar ou for pulado (if: always()),
  # em vez de compartilhar um único job monolítico onde um parse travado
  # impedia a publicação do dataset.

  parse-assembleia:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: mkdir -p /tmp/leizilla-xmls

      - name: Parse — ro/assembleia
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla parse-all \
            --ente ro --fonte assembleia \
            --start 1 --end 5000 \
            --limit 6 --output-dir /tmp/leizilla-xmls \
            --skip-existing --error-threshold 20 --upload

      - name: Notify on failure
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/notify-run-failure
        with:
          job-label: "parse-release / assembleia"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  parse-casacivil-lei:
    needs: parse-assembleia
    if: always() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: mkdir -p /tmp/leizilla-xmls

      - name: Parse — ro/casacivil lei
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla parse-all \
            --ente ro --fonte casacivil --tipo lei \
            --start 1 --end 6000 \
            --limit 6 --output-dir /tmp/leizilla-xmls \
            --skip-existing --error-threshold 20 --upload

      - name: Notify on failure
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/notify-run-failure
        with:
          job-label: "parse-release / casacivil-lei"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  parse-casacivil-lc:
    needs: parse-casacivil-lei
    if: always() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: mkdir -p /tmp/leizilla-xmls

      - name: Parse — ro/casacivil lc
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          uv run leizilla parse-all \
            --ente ro --fonte casacivil --tipo lc \
            --start 1 --end 1300 \
            --limit 6 --output-dir /tmp/leizilla-xmls \
            --skip-existing --error-threshold 20 --upload

      - name: Notify on failure
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/notify-run-failure
        with:
          job-label: "parse-release / casacivil-lc"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  parse-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: mkdir -p /tmp/leizilla-xmls

      - name: Parse batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          SKIP="${{ inputs.skip_existing || 'true' }}"
          if [ "${DRY_RUN,,}" = "true" ]; then UPLOAD_FLAG="--no-upload"; else UPLOAD_FLAG="--upload"; fi
          if [ "${SKIP,,}" = "true" ]; then SKIP_FLAG="--skip-existing"; else SKIP_FLAG="--no-skip-existing"; fi
          uv run leizilla parse-all \
            --ente "${{ inputs.ente || 'ro' }}" \
            --fonte "${{ inputs.fonte || 'casacivil' }}" \
            --tipo "${{ inputs.tipo || 'lei' }}" \
            --start "${{ inputs.start_num || '1' }}" \
            --end "${{ inputs.end_num || '100' }}" \
            --input-type "${{ inputs.input_type || 'ocr' }}" \
            --limit "${{ inputs.limit || '50' }}" \
            --output-dir /tmp/leizilla-xmls \
            --error-threshold 20 \
            $SKIP_FLAG \
            $UPLOAD_FLAG

      - name: Notify on failure
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/notify-run-failure
        with:
          job-label: "parse-release / dispatch"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  etl:
    needs: [parse-assembleia, parse-casacivil-lei, parse-casacivil-lc, parse-dispatch]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: mkdir -p /tmp/leizilla-xmls

      - name: Fetch all parsed XMLs from IA (cumulative Parquet)
        run: |
          uv run leizilla fetch-all-parsed \
            --ente "${{ inputs.ente || 'ro' }}" \
            --output-dir /tmp/leizilla-xmls

      - name: Consolidate XMLs → Parquet
        run: |
          XML_COUNT=$(find /tmp/leizilla-xmls -name '*.xml' | wc -l)
          echo "XMLs disponíveis: $XML_COUNT"
          if [ "$XML_COUNT" -eq 0 ]; then
            echo "Sem XMLs para consolidar — encerrando."
            exit 0
          fi
          uv run leizilla consolidate \
            /tmp/leizilla-xmls \
            --output /tmp/leizilla-dataset.parquet \
            --ente "${{ inputs.ente || 'ro' }}"

      - name: Release dataset → IA
        if: "${{ inputs.dry_run != 'true' }}"
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          if [ ! -f /tmp/leizilla-dataset.parquet ]; then
            echo "Parquet não gerado — skip release."
            exit 0
          fi
          uv run leizilla release-dataset \
            /tmp/leizilla-dataset.parquet \
            --ente "${{ inputs.ente || 'ro' }}" \
            --version "${{ inputs.dataset_version || '0' }}"

      - name: Dry-run stats (sem upload)
        if: "${{ inputs.dry_run == 'true' }}"
        run: |
          if [ ! -f /tmp/leizilla-dataset.parquet ]; then
            echo "Parquet não gerado."
            exit 0
          fi
          uv run leizilla release-dataset \
            /tmp/leizilla-dataset.parquet \
            --ente "${{ inputs.ente || 'ro' }}" \
            --version "${{ inputs.dataset_version || '0' }}" \
            --dry-run

      - name: Notify on failure
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/notify-run-failure
        with:
          job-label: "parse-release / etl"
          github-token: ${{ secrets.GITHUB_TOKEN }}
